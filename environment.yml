name: OpenLDMPy
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  - pip

  # Geospatial Stack (Critical C++ binaries managed here)
  - gdal>=3.4.0
  - rasterio>=1.4.0
  - libgdal
  - proj
  - geos
  - geopandas>=1.0.0
  - shapely>=2.0.0

  # Data Science & Math
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - scikit-learn>=1.7.0
  - joblib>=1.3.0
  - statsmodels>=0.14.0
  - matplotlib>=3.8.0  # cartography.py (legend/scale bar/north arrow)

  # GUI Dependencies
  - pyqt>=5.15.0
  - pyqtwebengine>=5.15.0

  # Scenario files (GUI Open/Save, OpenLDM.py --config)
  - pyyaml>=6.0

  # Testing
  - pytest>=8.0.0

